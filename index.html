<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام البيانات العائلية</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

body {
    font-family: 'Tajawal', sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#0ea5e9);
    min-height:100vh;
}

.glass {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
}

.hidden-content { display:none; }

.fade-in {
    animation: fade .6s ease;
}

@keyframes fade {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body class="p-4 md:p-8 text-white">

<!-- LOGIN -->
<div id="login-screen" class="max-w-md mx-auto mt-24 glass p-8 rounded-3xl text-center shadow-2xl fade-in">
    <div class="text-5xl mb-4">🔐</div>
    <h2 class="text-2xl font-bold mb-6">النظام الخاص</h2>

    <input type="password" id="pass-input"
        class="w-full p-3 rounded-xl text-black text-center mb-4 outline-none focus:ring-2 focus:ring-blue-400"
        placeholder="كلمة السر">

    <button onclick="checkPass()"
        class="w-full bg-blue-500 hover:bg-blue-600 py-3 rounded-xl font-bold transition duration-300 shadow-lg hover:scale-105">
        دخول
    </button>

    <p id="error-msg" class="text-red-400 mt-4 hidden">كلمة المرور غير صحيحة</p>
</div>

<!-- MAIN -->
<div id="main-content" class="hidden-content fade-in max-w-6xl mx-auto">

<!-- HEADER -->
<header class="glass p-5 rounded-2xl flex justify-between items-center mb-6 shadow-lg">
    <h1 class="text-xl md:text-2xl font-bold">لوحة التحكم</h1>
    <button onclick="location.reload()"
        class="bg-red-500/80 hover:bg-red-600 px-4 py-2 rounded-xl text-sm font-bold transition">
        خروج
    </button>
</header>

<!-- CARDS -->
<div class="grid md:grid-cols-2 gap-6 mb-6">

    <div class="glass p-6 rounded-2xl shadow-xl">
        <h3 class="mb-3 font-bold">حاسبة العمر</h3>

        <div class="flex gap-2">
            <input type="date" id="quick-date"
                class="flex-1 p-2 rounded-lg text-black">
            <button onclick="calcQuick()"
                class="bg-blue-500 px-4 rounded-lg hover:bg-blue-600 transition">
                احسب
            </button>
        </div>

        <p id="quick-res"
            class="mt-3 text-center bg-white/10 rounded-lg py-2 hidden"></p>
    </div>

    <div class="glass p-6 rounded-2xl flex justify-around items-center shadow-xl">
        <div class="text-center">
            <p class="opacity-70 text-sm">عدد السجلات</p>
            <p class="text-3xl font-bold">15</p>
        </div>
        <div class="text-center border-r border-white/20 pr-6">
            <p class="opacity-70 text-sm">السنة</p>
            <p class="text-3xl font-bold">2026</p>
        </div>
    </div>

</div>

<!-- TABLE -->
<div class="glass rounded-2xl overflow-hidden shadow-2xl">

<table class="w-full text-right">
<thead class="bg-white/10">
<tr>
<th class="p-4">الاسم</th>
<th class="p-4 text-center">EN</th>
<th class="p-4 text-center">ميلادي</th>
<th class="p-4 text-center">هجري</th>
<th class="p-4">العمر</th>
</tr>
</thead>

<tbody id="data-rows" class="divide-y divide-white/10"></tbody>

</table>

</div>

</div>

<script>
const P = "2026";

const data = [
{ar:"حـب. عبـ.",en:"Hab. Abd.",d:"1980-02-01",h:"1400-03-14"},
{ar:"إفـ. عبـ.",en:"Ift. Abd.",d:"1982-06-01",h:"1402-08-09"},
{ar:"هنـ. عبـ.",en:"Han. Abd.",d:"1986-06-01",h:"1406-09-24"},
{ar:"افـ. عبـ.",en:"Ift. Abd.",d:"1988-11-01",h:"1409-03-23"},
{ar:"سهـ. عبـ.",en:"Sih. Abd.",d:"1989-11-01",h:"1410-04-03"},
{ar:"طلـ. عبـ.",en:"Tal. Abd.",d:"1990-10-01",h:"1411-03-12"},
{ar:"ند. عبـ.",en:"Nid. Abd.",d:"1996-07-01",h:"1417-02-14"},
{ar:"شا. فا.",en:"Sha. Far.",d:"2003-08-28",h:"1424-07-01"},
{ar:"محـ. حبـ.",en:"Mah. Hab.",d:"2004-08-12",h:"1425-06-26"},
{ar:"شذ. فا.",en:"Sha. Far.",d:"2005-04-03",h:"1426-02-24"},
{ar:"شا. فا.",en:"Sha. Far.",d:"2008-03-17",h:"1429-03-09"},
{ar:"محـ. فا.",en:"Moh. Far.",d:"2010-05-26",h:"1431-06-12"},
{ar:"وئـ. فا.",en:"Wia. Far.",d:"2012-10-21",h:"1433-12-05"},
{ar:"فا. فا.",en:"Far. Fai.",d:"2022-10-13",h:"1444-03-17"},
{ar:"عا. فا.",en:"Ala. Fai.",d:"2023-12-02",h:"1445-05-18"}
];

function checkPass(){
let input=document.getElementById('pass-input').value;
if(input===P){
document.getElementById('login-screen').style.display='none';
document.getElementById('main-content').classList.remove('hidden-content');
render();
}else{
document.getElementById('error-msg').classList.remove('hidden');
}
}

function getAge(dob){
let b=new Date(dob),n=new Date();
let y=n.getFullYear()-b.getFullYear();
let m=n.getMonth()-b.getMonth();
if(m<0){y--;m+=12;}
return y+" سنة";
}

function render(){
let body=document.getElementById('data-rows');
body.innerHTML=data.map(i=>`
<tr class="hover:bg-white/5 transition">
<td class="p-4 font-bold">${i.ar}</td>
<td class="p-4 text-center text-blue-300">${i.en}</td>
<td class="p-4 text-center">${i.d}</td>
<td class="p-4 text-center text-green-300">${i.h}</td>
<td class="p-4 font-bold">${getAge(i.d)}</td>
</tr>
`).join('');
}

function calcQuick(){
let val=document.getElementById('quick-date').value;
if(!val)return;
let res=document.getElementById('quick-res');
res.innerText="العمر: "+getAge(val);
res.classList.remove('hidden');
}
</script>

</body>
</html>
