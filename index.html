<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام البيانات العائلية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f2f5; }
        .hidden-content { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-3xl shadow-2xl text-center border border-blue-100">
        <div class="text-blue-600 mb-4 text-5xl">🔒</div>
        <h2 class="text-2xl font-bold mb-6 text-gray-800">نظام البيانات الخاص</h2>
        <input type="password" id="pass-input" class="border-2 border-blue-50 p-3 w-full mb-4 rounded-2xl focus:border-blue-500 outline-none text-center text-lg" placeholder="كلمة السر">
        <button onclick="checkPass()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-2xl w-full shadow-lg transition-all">دخول</button>
        <p id="error-msg" class="text-red-500 mt-4 hidden">كلمة المرور غير صحيحة!</p>
    </div>

    <div id="main-content" class="hidden-content max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-5 rounded-2xl shadow-sm">
            <h1 class="text-xl md:text-2xl font-bold text-blue-900">لوحة التحكم الشخصية</h1>
            <button onclick="location.reload()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-sm font-bold">خروج</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 text-white">
            <div class="bg-gradient-to-r from-blue-700 to-blue-500 p-6 rounded-2xl shadow-lg">
                <h3 class="font-bold mb-3">حاسبة العمر السريعة</h3>
                <div class="flex gap-2">
                    <input type="date" id="quick-date" class="flex-1 p-2 rounded-lg text-gray-800 outline-none">
                    <button onclick="calcQuick()" class="bg-white text-blue-700 px-4 py-2 rounded-lg font-bold">احسب</button>
                </div>
                <p id="quick-res" class="mt-3 font-bold text-center bg-white/20 rounded-lg py-1 hidden"></p>
            </div>
            <div class="bg-gradient-to-r from-emerald-600 to-teal-500 p-6 rounded-2xl shadow-lg flex items-center justify-around">
                <div class="text-center">
                    <p class="text-sm opacity-80">إجمالي السجلات</p>
                    <p class="text-3xl font-bold">15</p>
                </div>
                <div class="text-center border-r border-white/20 pr-6">
                    <p class="text-sm opacity-80">السنة الحالية</p>
                    <p class="text-3xl font-bold">2026</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <div class="overflow-x-auto">
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-100">
                            <th class="p-4 text-blue-900">الاسم (عربي)</th>
                            <th class="p-4 text-blue-600 text-center">الاسم (EN)</th>
                            <th class="p-4 text-center">ميلادي</th>
                            <th class="p-4 text-center">هجري</th>
                            <th class="p-4 text-emerald-700">العمر الحالي</th>
                        </tr>
                    </thead>
                    <tbody id="data-rows" class="divide-y divide-gray-50">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // كلمة السر الافتراضية
        const P = "2026"; 

        const data = [
            {ar: "حـب. عبـ.", en: "Hab. Abd.", d: "1980-02-01", h: "1400-03-14"},
            {ar: "إفـ. عبـ.", en: "Ift. Abd.", d: "1982-06-01", h: "1402-08-09"},
            {ar: "هنـ. عبـ.", en: "Han. Abd.", d: "1986-06-01", h: "1406-09-24"},
            {ar: "افـ. عبـ.", en: "Ift. Abd.", d: "1988-11-01", h: "1409-03-23"},
            {ar: "سهـ. عبـ.", en: "Sih. Abd.", d: "1989-11-01", h: "1410-04-03"},
            {ar: "طلـ. عبـ.", en: "Tal. Abd.", d: "1990-10-01", h: "1411-03-12"},
            {ar: "ند. عبـ.", en: "Nid. Abd.", d: "1996-07-01", h: "1417-02-14"},
            {ar: "شا. فا.", en: "Sha. Far.", d: "2003-08-28", h: "1424-07-01"},
            {ar: "محـ. حبـ.", en: "Mah. Hab.", d: "2004-08-12", h: "1425-06-26"},
            {ar: "شذ. فا.", en: "Sha. Far.", d: "2005-04-03", h: "1426-02-24"},
            {ar: "شا. فا.", en: "Sha. Far.", d: "2008-03-17", h: "1429-03-09"},
            {ar: "محـ. فا.", en: "Moh. Far.", d: "2010-05-26", h: "1431-06-12"},
            {ar: "وئـ. فا.", en: "Wia. Far.", d: "2012-10-21", h: "1433-12-05"},
            {ar: "فا. فا.", en: "Far. Fai.", d: "2022-10-13", h: "1444-03-17"},
            {ar: "عا. فا.", en: "Ala. Fai.", d: "2023-12-02", h: "1445-05-18"}
        ];

        function checkPass() {
            const input = document.getElementById('pass-input').value;
            if(input === P) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden-content');
                render();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        function getAge(dob) {
            const b = new Date(dob);
            const n = new Date();
            let y = n.getFullYear() - b.getFullYear();
            let m = n.getMonth() - b.getMonth();
            let d = n.getDate() - b.getDate();
            if (d < 0) { m--; d += new Date(n.getFullYear(), n.getMonth(), 0).getDate(); }
            if (m < 0) { y--; m += 12; }
            return `${y} سنة و${m} شهر`;
        }

        function render() {
            const body = document.getElementById('data-rows');
            body.innerHTML = data.map(i => `
                <tr class="hover:bg-blue-50/30 transition-colors">
                    <td class="p-4 font-bold text-gray-800">${i.ar}</td>
                    <td class="p-4 text-center text-blue-600">${i.en}</td>
                    <td class="p-4 text-center text-gray-500 text-sm">${i.d}</td>
                    <td class="p-4 text-center text-emerald-600 font-medium">${i.h}</td>
                    <td class="p-4 font-bold text-gray-700">${getAge(i.d)}</td>
                </tr>
            `).join('');
        }

        function calcQuick() {
            const val = document.getElementById('quick-date').value;
            if(!val) return;
            const res = document.getElementById('quick-res');
            res.innerText = "العمر: " + getAge(val);
            res.classList.remove('hidden');
        }
    </script>
</body>
</html>
