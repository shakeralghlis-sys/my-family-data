<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام العائلة</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

body{
font-family:'Tajawal',sans-serif;
background: linear-gradient(135deg,#0f172a,#1e3a8a,#0ea5e9);
color:white;
}

.glass{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.2);
}

.hidden{display:none;}
</style>
</head>

<body class="p-4">

<!-- LOGIN -->
<div id="login" class="max-w-sm mx-auto mt-20 glass p-6 rounded-2xl text-center">
<h2 class="text-xl mb-4">🔐 دخول</h2>

<input id="pass" type="password" placeholder="كلمة السر"
class="w-full p-2 rounded text-black mb-3 text-center">

<button onclick="login()"
class="bg-blue-500 w-full py-2 rounded">دخول</button>

<p id="err" class="text-red-400 mt-2 hidden">خطأ</p>
</div>

<!-- MAIN -->
<div id="app" class="hidden">

<!-- HEADER -->
<div class="glass p-4 rounded-xl flex justify-between items-center mb-4">
<h2>لوحة التحكم</h2>
<button onclick="logout()" class="bg-red-500 px-3 py-1 rounded">خروج</button>
</div>

<!-- ACTIONS -->
<div class="mb-4 flex gap-2">
<button onclick="openModal()"
class="bg-green-500 px-4 py-2 rounded">➕ إضافة</button>

<input id="search" oninput="render()"
placeholder="بحث..."
class="flex-1 p-2 rounded text-black">
</div>

<!-- TABLE -->
<div class="glass rounded-xl overflow-hidden">
<table class="w-full text-center text-sm">
<thead class="bg-white/10">
<tr>
<th>الاسم</th>
<th>EN</th>
<th>الميلاد</th>
<th>العمر</th>
<th>⚙️</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">

<div class="glass p-6 rounded-xl w-80">

<h3 class="mb-3">إضافة / تعديل</h3>

<input id="ar" placeholder="الاسم عربي"
class="w-full p-2 mb-2 rounded text-black">

<input id="en" placeholder="EN"
class="w-full p-2 mb-2 rounded text-black">

<input id="date" type="date"
class="w-full p-2 mb-3 rounded text-black">

<div class="flex gap-2">
<button onclick="save()" class="bg-blue-500 flex-1 py-2 rounded">حفظ</button>
<button onclick="closeModal()" class="bg-gray-500 flex-1 py-2 rounded">إلغاء</button>
</div>

</div>
</div>

<script>
const PASS="2026";

let data = JSON.parse(localStorage.getItem("family")) || [];
let editIndex = null;

// LOGIN
function login(){
if(document.getElementById('pass').value===PASS){
document.getElementById('login').classList.add('hidden');
document.getElementById('app').classList.remove('hidden');
render();
}else{
document.getElementById('err').classList.remove('hidden');
}
}

function logout(){
location.reload();
}

// AGE
function age(d){
let b=new Date(d),n=new Date();

let y=n.getFullYear()-b.getFullYear();
let m=n.getMonth()-b.getMonth();
let day=n.getDate()-b.getDate();

if(day<0){m--;day+=30;}
if(m<0){y--;m+=12;}

return y+"س "+m+"ش "+day+"ي";
}

// RENDER
function render(){
let s=document.getElementById('search').value.toLowerCase();

let rows=data
.filter(x=>x.ar.includes(s)||x.en.toLowerCase().includes(s))
.map((x,i)=>`
<tr>
<td>${x.ar}</td>
<td>${x.en}</td>
<td>${x.d}</td>
<td>${age(x.d)}</td>
<td>
<button onclick="edit(${i})">✏️</button>
<button onclick="del(${i})">❌</button>
</td>
</tr>
`).join('');

document.getElementById('rows').innerHTML=rows;
}

// MODAL
function openModal(){
editIndex=null;
document.getElementById('ar').value='';
document.getElementById('en').value='';
document.getElementById('date').value='';
document.getElementById('modal').classList.remove('hidden');
}

function closeModal(){
document.getElementById('modal').classList.add('hidden');
}

// SAVE
function save(){
let ar=document.getElementById('ar').value;
let en=document.getElementById('en').value;
let d=document.getElementById('date').value;

if(!ar||!d)return;

if(editIndex===null){
data.push({ar,en,d});
}else{
data[editIndex]={ar,en,d};
}

localStorage.setItem("family",JSON.stringify(data));
closeModal();
render();
}

// EDIT
function edit(i){
editIndex=i;

document.getElementById('ar').value=data[i].ar;
document.getElementById('en').value=data[i].en;
document.getElementById('date').value=data[i].d;

document.getElementById('modal').classList.remove('hidden');
}

// DELETE
function del(i){
if(confirm("حذف؟")){
data.splice(i,1);
localStorage.setItem("family",JSON.stringify(data));
render();
}
}
</script>

</body>
</html>
