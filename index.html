<script>
const P = "2026";

let data = JSON.parse(localStorage.getItem("familyData")) || [];

function saveData(){
    localStorage.setItem("familyData", JSON.stringify(data));
}

// تسجيل الدخول
function checkPass(){
    let input = document.getElementById('pass-input').value;
    if(input === P){
        document.getElementById('login-screen').style.display='none';
        document.getElementById('main-content').classList.remove('hidden-content');
        render();
    }
}

// حساب العمر (سنين + شهور + أيام)
function getAge(dob){
    let b = new Date(dob);
    let n = new Date();

    let y = n.getFullYear() - b.getFullYear();
    let m = n.getMonth() - b.getMonth();
    let d = n.getDate() - b.getDate();

    if(d < 0){
        m--;
        d += new Date(n.getFullYear(), n.getMonth(), 0).getDate();
    }

    if(m < 0){
        y--;
        m += 12;
    }

    return `${y} سنة - ${m} شهر - ${d} يوم`;
}

// عرض البيانات
function render(){
    let body = document.getElementById('data-rows');

    body.innerHTML = data.map((i,index)=>`
    <tr>
        <td>${i.ar}</td>
        <td>${i.en}</td>
        <td>${i.d}</td>
        <td>${i.h || "-"}</td>
        <td>${getAge(i.d)}</td>
        <td>
            <button onclick="edit(${index})">✏️</button>
            <button onclick="removeItem(${index})">❌</button>
        </td>
    </tr>
    `).join('');
}

// إضافة
function addMember(){
    let ar = prompt("الاسم عربي");
    let en = prompt("الاسم EN");
    let d = prompt("تاريخ الميلاد YYYY-MM-DD");

    if(!ar || !d) return;

    data.push({ar,en,d});
    saveData();
    render();
}

// حذف
function removeItem(i){
    if(confirm("حذف؟")){
        data.splice(i,1);
        saveData();
        render();
    }
}

// تعديل
function edit(i){
    let item = data[i];

    let ar = prompt("تعديل الاسم", item.ar);
    let en = prompt("تعديل EN", item.en);
    let d = prompt("تعديل التاريخ", item.d);

    data[i] = {ar,en,d};

    saveData();
    render();
}
</script>
